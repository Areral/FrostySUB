name: 🚀 Proxy Sub Update

# Описание: Автоматическое обновление подписки
# Запускается по расписанию и проверяет работоспособность каждого узла через Sing-box.

on:
  schedule:
    # Запуск каждые 6 часов
    - cron: '0 */6 * * *'
  workflow_dispatch: # Позволяет запускать вручную кнопкой в интерфейсе GitHub

jobs:
  update-subscription:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Ограничение времени выполнения
    
    permissions:
      contents: write # Разрешение на запись файлов в репозиторий

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Установка необходимых библиотек
          pip install aiohttp aiohttp_socks

      - name: 🛠 Install Sing-box
        run: |
          # Скачиваем и устанавливаем сетевое ядро Sing-box
          sudo bash -c "$(curl -L https://sing-box.app/install.sh)"
          sing-box version

      - name: 🚀 Run Proxy Validation Bot
        # Запускаем основной скрипт
        run: python core/bot.py

      - name: 💾 Commit and Push Changes
        run: |
          git config --global user.name "SunnyBot"
          git config --global user.email "bot@github.com"
          
          # Добавляем все важные файлы
          git add subscription.txt index.html
          
          timestamp=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          git commit -m "🚀 Site & Sub Update: $timestamp" || exit 0
          git push
